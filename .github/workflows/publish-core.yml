name: Publish Formula to Homebrew Core

on:
  push:
    branches:
      - main
    paths:
      - 'Formula/*.rb'
  workflow_dispatch:
    inputs:
      formula:
        description: Optional formula name (without .rb) to run manually
        required: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect updated formulae
        id: detect
        env:
          FORMULA_INPUT: ${{ inputs.formula }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          FORMULAE=""
          if [ -n "${FORMULA_INPUT:-}" ]; then
            FORMULAE="$FORMULA_INPUT"
          else
            if [ "$EVENT_NAME" = "push" ]; then
              BASE="$BEFORE_SHA"
              if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
                FORMULAE="$(git ls-files 'Formula/*.rb')"
              else
                FORMULAE="$(git diff --name-only "$BASE" "$CURRENT_SHA" -- 'Formula/*.rb')"
              fi
            else
              FORMULAE="$(git ls-files 'Formula/*.rb')"
            fi
          fi

          FORMULAE="$(printf '%s\n' "$FORMULAE" | sed -e 's|^Formula/||' -e 's|\.rb$||' | awk 'NF')"
          FORMULAE="$(printf '%s\n' "$FORMULAE" | sort -u)"

          if [ -z "$FORMULAE" ]; then
            echo "No formula changes detected."
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json="$(printf '%s\n' "$FORMULAE" | jq -R -s -c 'split("\n") | map(select(length>0))')"
          echo "matrix=$json" >> "$GITHUB_OUTPUT"

          echo "Will publish the following formulae:"
          while IFS= read -r formula; do
            [ -z "$formula" ] && continue
            echo "  - $formula"
          done <<< "$FORMULAE"

  publish:
    needs: detect
    if: ${{ needs.detect.outputs.matrix != '[]' }}
    runs-on: macos-latest
    strategy:
      matrix:
        formula: ${{ fromJson(needs.detect.outputs.matrix) }}
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
      HOMEBREW_NO_INSTALL_FROM_API: 1
      HOMEBREW_CORE_FORK_OWNER: ${{ vars.HOMEBREW_CORE_FORK_OWNER }}
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Verify secrets
        run: |
          if [ -z "${HOMEBREW_GITHUB_API_TOKEN:-}" ]; then
            echo "HOMEBREW_GITHUB_API_TOKEN is required. Add it as a repository secret." >&2
            exit 1
          fi

      - name: Configure GitHub credentials
        run: |
          set -euo pipefail
          git config --global credential.helper store
          printf "https://x-access-token:%s@github.com\n" "$HOMEBREW_GITHUB_API_TOKEN" > ~/.git-credentials
          chmod 600 ~/.git-credentials

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Read formula metadata
        id: metadata
        env:
          FORMULA: ${{ matrix.formula }}
        run: |
          set -euo pipefail
          FORMULA_PATH="./Formula/${FORMULA}.rb"
          if [ ! -f "$FORMULA_PATH" ]; then
            echo "Formula file $FORMULA_PATH not found." >&2
            exit 1
          fi

          VERSION="$(grep -m1 -E 'releases/download/v[0-9]+' "$FORMULA_PATH" | sed -E 's/.*download\/v([^/]+)\/.*/\1/')"
          if [ -z "${VERSION:-}" ]; then
            VERSION_LINE="$(grep -m1 -E '^[[:space:]]*version[[:space:]]+\"' "$FORMULA_PATH" || true)"
            if [ -n "$VERSION_LINE" ]; then
              VERSION="$(echo "$VERSION_LINE" | sed -E 's/.*\"([^\"]+)\".*/\1/')"
            fi
          fi
          if [ -z "${VERSION:-}" ]; then
            echo "Could not detect the version in $FORMULA_PATH" >&2
            exit 1
          fi
          echo "Detected version $VERSION from $FORMULA_PATH"

          URLS="$(grep -E '^[[:space:]]*url \"' "$FORMULA_PATH" | sed -E 's/^[[:space:]]*url \"([^\"]+)\".*/\1/' || true)"
          SHAS="$(grep -E '^[[:space:]]*sha256 \"' "$FORMULA_PATH" | sed -E 's/^[[:space:]]*sha256 \"([^\"]+)\".*/\1/' || true)"

          if [ -n "$URLS" ]; then
            echo "Detected download URLs:"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              echo "  - $line"
            done <<< "$URLS"
          fi

          if [ -n "$SHAS" ]; then
            echo "Detected SHA256 entries:"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              echo "  - $line"
            done <<< "$SHAS"
          fi

          URLS_JSON='[]'
          SHAS_JSON='[]'
          if [ -n "$URLS" ]; then
            URLS_JSON="$(printf '%s\n' "$URLS" | jq -R -s -c 'split("\n") | map(select(length>0))')"
          fi
          if [ -n "$SHAS" ]; then
            SHAS_JSON="$(printf '%s\n' "$SHAS" | jq -R -s -c 'split("\n") | map(select(length>0))')"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "urls=$URLS_JSON" >> "$GITHUB_OUTPUT"
          echo "sha256s=$SHAS_JSON" >> "$GITHUB_OUTPUT"

      - name: Test formula from tap
        env:
          FORMULA: ${{ matrix.formula }}
        run: |
          set -euo pipefail
          FORMULA_PATH="./Formula/${FORMULA}.rb"
          if [ ! -f "$FORMULA_PATH" ]; then
            echo "Formula file $FORMULA_PATH not found." >&2
            exit 1
          fi

          brew update
          brew tap hebertcisco/homebrew-tap https://github.com/hebertcisco/homebrew-tap
          TAP_DIR="$(brew --repository hebertcisco/homebrew-tap)"
          mkdir -p "$TAP_DIR/Formula"
          rsync -a "$FORMULA_PATH" "$TAP_DIR/Formula/"

          brew install --build-from-source "hebertcisco/homebrew-tap/${FORMULA}"
          brew test "hebertcisco/homebrew-tap/${FORMULA}"
          brew audit --new --strict "hebertcisco/homebrew-tap/${FORMULA}"

      - name: Open Homebrew/homebrew-core pull request
        env:
          FORMULA: ${{ matrix.formula }}
          FORMULA_VERSION: ${{ steps.metadata.outputs.version }}
          FORMULA_URLS: ${{ steps.metadata.outputs.urls }}
          FORMULA_SHAS: ${{ steps.metadata.outputs.sha256s }}
        run: |
          set -euo pipefail
          FORMULA_PATH="./Formula/${FORMULA}.rb"
          if [ ! -f "$FORMULA_PATH" ]; then
            echo "Formula file $FORMULA_PATH not found." >&2
            exit 1
          fi

          if [ -z "${FORMULA_VERSION:-}" ]; then
            echo "Formula version metadata missing for ${FORMULA}." >&2
            exit 1
          fi

          echo "Preparing bump-formula-pr for ${FORMULA} ${FORMULA_VERSION}"
          echo "Formula URLs payload: ${FORMULA_URLS:-[]}"
          echo "Formula SHA payload: ${FORMULA_SHAS:-[]}"

          brew update

          CURRENT_VERSION=""
          if CURRENT_INFO="$(brew info --json=v2 "homebrew/core/${FORMULA}" 2>/dev/null)"; then
            CURRENT_VERSION="$(echo "$CURRENT_INFO" | jq -r 'if type == "array" then (.[0].versions.stable // empty) elif has("formulae") then (.formulae[0].versions.stable // empty) else empty end')"
            if [ -n "$CURRENT_VERSION" ]; then
              echo "Detected ${FORMULA} ${CURRENT_VERSION} in homebrew-core via brew info."
            fi
          else
            echo "brew info did not return metadata for ${FORMULA} in homebrew-core; will inspect the tap checkout directly."
          fi

          if [ -z "$CURRENT_VERSION" ]; then
            CORE_REPO="$(brew --repository homebrew/core)"
            CORE_FORMULA_PATH=""
            if [ -d "$CORE_REPO" ]; then
              CORE_FORMULA_PATH="$(find "$CORE_REPO" -path "*/Formula/${FORMULA}.rb" -print -quit || true)"
              if [ -z "$CORE_FORMULA_PATH" ] && [ -d "$CORE_REPO/Formula" ]; then
                CORE_FORMULA_PATH="$(find "$CORE_REPO/Formula" -name "${FORMULA}.rb" -print -quit || true)"
              fi

              if [ -n "$CORE_FORMULA_PATH" ] && [ -f "$CORE_FORMULA_PATH" ]; then
                echo "Found ${FORMULA}.rb in homebrew-core checkout at ${CORE_FORMULA_PATH}."
                CORE_VERSION="$(grep -m1 -E 'releases/download/v[0-9]+' "$CORE_FORMULA_PATH" | sed -E 's/.*download\/v([^/]+)\/.*/\1/' || true)"
                if [ -z "${CORE_VERSION:-}" ]; then
                  CORE_VERSION_LINE="$(grep -m1 -E '^[[:space:]]*version[[:space:]]+\"' "$CORE_FORMULA_PATH" || true)"
                  if [ -n "$CORE_VERSION_LINE" ]; then
                    CORE_VERSION="$(echo "$CORE_VERSION_LINE" | sed -E 's/.*\"([^\"]+)\".*/\1/')"
                  fi
                fi

                if [ -n "${CORE_VERSION:-}" ]; then
                  CURRENT_VERSION="$CORE_VERSION"
                  echo "Detected ${FORMULA} ${CURRENT_VERSION} directly from the homebrew-core formula file."
                else
                  echo "Unable to parse the version from ${CORE_FORMULA_PATH}."
                fi
              else
                echo "homebrew-core checkout does not contain ${FORMULA}.rb; treating this as a new formula submission."
              fi
            else
              echo "brew --repository homebrew/core did not return a directory; cannot inspect the current formula file."
            fi
          fi

          if [ -z "$CURRENT_VERSION" ]; then
            echo "homebrew-core does not currently ship ${FORMULA}. Bootstrapping a new formula submission."

            CORE_TEMPLATE="Formula/${FORMULA}.rb.core"
            if [ ! -f "$CORE_TEMPLATE" ]; then
              echo "::error::Core template ${CORE_TEMPLATE} not found. Add it to the tap to enable automation." >&2
              exit 1
            fi

            CORE_FORK_OWNER="${HOMEBREW_CORE_FORK_OWNER:-${GITHUB_ACTOR}}"
            if [ -z "$CORE_FORK_OWNER" ]; then
              echo "::error::Unable to determine fork owner (set HOMEBREW_CORE_FORK_OWNER or push from a user account)." >&2
              exit 1
            fi

            if [ -z "${HOMEBREW_GITHUB_API_TOKEN:-}" ]; then
              echo "::error::HOMEBREW_GITHUB_API_TOKEN is required for GitHub CLI authentication." >&2
              exit 1
            fi

            printf '%s\n' "$HOMEBREW_GITHUB_API_TOKEN" | gh auth login --hostname github.com --with-token

            if ! gh repo view "${CORE_FORK_OWNER}/homebrew-core" >/dev/null 2>&1; then
              echo "Creating fork ${CORE_FORK_OWNER}/homebrew-core via gh."
              if [ "$CORE_FORK_OWNER" = "${GITHUB_ACTOR}" ]; then
                gh repo fork homebrew/homebrew-core --remote=false
              else
                gh repo fork homebrew/homebrew-core --remote=false --org "$CORE_FORK_OWNER"
              fi
            fi

            CORE_BRANCH="add-${FORMULA}-${FORMULA_VERSION}"
            CORE_CLONE="$RUNNER_TEMP/homebrew-core"
            rm -rf "$CORE_CLONE"

            CORE_REMOTE_URL="https://x-access-token:${HOMEBREW_GITHUB_API_TOKEN}@github.com/${CORE_FORK_OWNER}/homebrew-core.git"
            git clone "$CORE_REMOTE_URL" "$CORE_CLONE"
            cd "$CORE_CLONE"
            git remote add upstream https://github.com/Homebrew/homebrew-core.git
            git fetch upstream
            git checkout -B "$CORE_BRANCH" upstream/master
            install -d Formula
            cp "$GITHUB_WORKSPACE/$CORE_TEMPLATE" "Formula/${FORMULA}.rb"

            brew audit --new-formula "${FORMULA}"

            git status --short
            git add "Formula/${FORMULA}.rb"
            git commit -m "${FORMULA}: add ${FORMULA_VERSION}"
            git push origin "$CORE_BRANCH" --force

            gh pr create \
              --repo homebrew/homebrew-core \
              --base master \
              --head "${CORE_FORK_OWNER}:${CORE_BRANCH}" \
              --title "${FORMULA}: add ${FORMULA_VERSION}" \
              --body "Automated submission from hebertcisco/homebrew-tap."

            exit 0
          fi

          if [ "$CURRENT_VERSION" = "$FORMULA_VERSION" ]; then
            echo "homebrew-core already has ${FORMULA} at version ${CURRENT_VERSION}. Nothing to bump."
            exit 0
          fi

          args=(--strict --no-browse "${FORMULA}" "--version=$FORMULA_VERSION")
          brew bump-formula-pr "${args[@]}"
